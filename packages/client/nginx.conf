server {
    listen 80;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # index.html must never be cached
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Vite produces content-hashed filenames (e.g. index-Bx2k9mFd.js).
        # These are safe to cache indefinitely — the hash changes when content changes.
        location ~* \.(js|css|woff2?|ttf|otf|png|svg|jpg|ico|webp)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Proxy WebSocket connections to the collaboration server
    location /ws/ {
        # 'sync-server' is the service name in docker-compose.yml
        proxy_pass http://sync-server:1234/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Proxy REST API calls to the Spring Boot server
    location /api/ {
        proxy_pass http://api-server:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
