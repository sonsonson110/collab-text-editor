name: API Tests (Hurl)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hurl-api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Spring Boot API Server
        # Starts the app in the background. Spring Boot's docker-compose integration
        # will automatically start PostgreSQL based on packages/api-server/compose.yaml.
        # APP_INTERNAL_API_SECRET must match what the Hurl snapshot tests send as
        # x-internal-secret — the default value mirrors application.yaml's fallback.
        env:
          APP_INTERNAL_API_SECRET: sync-server-internal-secret-change-me
        run: |
          cd packages/api-server
          ./mvnw spring-boot:run &
          echo "Waiting for API server to start..."
          # Wait up to 60 seconds for the server to bind to port 8081
          timeout 60 bash -c 'until nc -z localhost 8081; do sleep 1; done'
          echo "API Server is up!"

      - name: Install Hurl
        # Official installation method for Debian/Ubuntu:
        # https://hurl.dev/docs/installation.html#debian-ubuntu
        run: |
          VERSION=8.0.0
          curl --silent --location --remote-name \
            https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl_${VERSION}_amd64.deb
          sudo apt install -y ./hurl_${VERSION}_amd64.deb
          rm ./hurl_${VERSION}_amd64.deb
          hurl --version

      - name: Run API Tests
        # INTERNAL_API_SECRET is forwarded to test-api.sh, which passes it to hurl
        # as --variable internal_secret=... for the snapshot endpoint tests.
        env:
          INTERNAL_API_SECRET: sync-server-internal-secret-change-me
        run: npm run test:api

      - name: Cleanup Docker resources
        if: always()
        run: |
          cd packages/api-server
          docker compose down -v
