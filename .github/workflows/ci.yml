# Consolidated CI/CD pipeline — replaces api-test.yml and deploy.yml.
#
# Job graph:
#   lint-and-unit ──► build-api-image ──► integration-tests ──► deploy (main only)
#
# • Job 1 runs fast lint + unit tests (no infra).
# • Job 2 builds the api-server Docker image and saves it as an artifact.
# • Job 3 loads the image into a hermetic docker-compose environment and
#   runs the Hurl API contract tests against it.
# • Job 4 builds all three production images, pushes to GHCR, and deploys
#   via SSH over Cloudflare Tunnel (main branch only).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ---------------------------------------------------------------------------
# Job 1: Lint and unit tests — no infrastructure, fast feedback.
# ---------------------------------------------------------------------------
jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── sync-server ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Lint sync-server
        run: npm run lint --workspace=@myapp/sync-server

      - name: Test sync-server
        run: npm run test:run --workspace=@myapp/sync-server

      # ── api-server (unit tests only — no DB) ──────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run api-server unit tests
        # With the @SpringBootTest classes removed, only JwtServiceTest remains.
        # No DB, no Docker, no Spring context — completes in seconds.
        working-directory: packages/api-server
        run: ./mvnw test -B

  # ---------------------------------------------------------------------------
  # Job 2: Build api-server Docker image and save as artifact.
  # ---------------------------------------------------------------------------
  build-api-image:
    name: Build API Server Image
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api-server/Dockerfile
          load: true
          tags: api-server-test:ci

      - name: Save image to tar
        run: docker save api-server-test:ci -o /tmp/api-server.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-server-image
          path: /tmp/api-server.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests — Hurl against the real Docker image.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (Hurl)
    runs-on: ubuntu-latest
    needs: build-api-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download api-server image artifact
        uses: actions/download-artifact@v4
        with:
          name: api-server-image

      - name: Load api-server image
        run: docker load -i api-server.tar

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up \
            --abort-on-container-exit \
            --exit-code-from hurl-tests

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ---------------------------------------------------------------------------
  # Job 4: Build all production images, push to GHCR, deploy via SSH.
  #         Runs only on the main branch after all tests pass.
  # ---------------------------------------------------------------------------
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [lint-and-unit, integration-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sync-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/sync-server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab-editor-sync-server:latest

      - name: Build and push api-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api-server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab-editor-api-server:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/collab-editor-client:latest
          build-args: |
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_ROOM_NAME=document-room

      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Configure SSH with Cloudflare Proxy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << EOF
          Host ${{ secrets.VM_SSH_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/id_ed25519
          EOF

      - name: Clean up unused Docker resources
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_SSH_HOST }} \
            "docker system prune -af"

      - name: Deploy stack to Docker Swarm
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_SSH_HOST }} \
            "IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }} \
             APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }} \
             APP_INTERNAL_API_SECRET=${{ secrets.APP_INTERNAL_API_SECRET }} \
             docker stack deploy \
               --with-registry-auth \
               -c - \
               collab-editor" < docker-stack.yml
